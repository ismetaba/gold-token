name: Deploy — Sepolia Staging

# Runs automatically after CI passes on main, or manually via workflow_dispatch.
on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no broadcast)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

# Only one deploy at a time; skip queued runs if a newer one is already pending.
concurrency:
  group: deploy-sepolia
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Gate: only proceed when upstream CI succeeded
  # ─────────────────────────────────────────────
  check-ci:
    name: CI gate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: CI passed
        run: echo "CI succeeded — proceeding with Sepolia deploy"

  # ─────────────────────────────────────────────
  # Deploy contracts to Sepolia testnet
  # ─────────────────────────────────────────────
  deploy-contracts:
    name: Contracts — Deploy to Sepolia
    runs-on: ubuntu-latest
    needs: check-ci
    environment: sepolia-staging

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Determine broadcast flag
        id: flags
        run: |
          DRY="${{ github.event.inputs.dry_run }}"
          # workflow_run triggers always broadcast; manual default is also broadcast unless dry_run=true
          if [ "$DRY" = "true" ]; then
            echo "broadcast_flags=" >> "$GITHUB_OUTPUT"
            echo "mode=dry-run" >> "$GITHUB_OUTPUT"
          else
            echo "broadcast_flags=--broadcast --slow" >> "$GITHUB_OUTPUT"
            echo "mode=live" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy contracts (${{ steps.flags.outputs.mode }})
        working-directory: contracts
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          mkdir -p deployments
          forge script script/Deploy.s.sol \
            --rpc-url sepolia \
            ${{ steps.flags.outputs.broadcast_flags }} \
            -vvvv

      - name: Upload deployment artifacts
        if: steps.flags.outputs.mode == 'live'
        uses: actions/upload-artifact@v4
        with:
          name: sepolia-deployments-${{ github.sha }}
          path: contracts/deployments/
          retention-days: 90

  # ─────────────────────────────────────────────
  # Verify contracts on Etherscan (live deploys only)
  # ─────────────────────────────────────────────
  verify-contracts:
    name: Contracts — Verify on Etherscan
    runs-on: ubuntu-latest
    needs: deploy-contracts
    if: github.event.inputs.dry_run != 'true'
    environment: sepolia-staging

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: sepolia-deployments-${{ github.sha }}
          path: contracts/deployments/

      - name: Verify all contracts
        working-directory: contracts
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          REGISTRY=deployments/11155111.json
          if [ ! -f "$REGISTRY" ]; then
            echo "No deployment registry found — skipping verification"
            exit 0
          fi

          verify_contract() {
            local address="$1"
            local contract="$2"
            if [ "$address" != "null" ] && [ -n "$address" ]; then
              echo "Verifying $contract at $address..."
              forge verify-contract "$address" "$contract" \
                --chain sepolia --watch || true
            fi
          }

          verify_contract "$(jq -r '.goldToken'          $REGISTRY)" "src/GoldToken.sol:GoldToken"
          verify_contract "$(jq -r '.complianceRegistry' $REGISTRY)" "src/ComplianceRegistry.sol:ComplianceRegistry"
          verify_contract "$(jq -r '.reserveOracle'      $REGISTRY)" "src/ReserveOracle.sol:ReserveOracle"
          verify_contract "$(jq -r '.mintController'     $REGISTRY)" "src/MintController.sol:MintController"
          verify_contract "$(jq -r '.burnController'     $REGISTRY)" "src/BurnController.sol:BurnController"
