name: gold-token

# ─────────────────────────────────────────────────────────────────────────────
# Local development stack
#
# Quick start:
#   cp .env.example .env        # fill in DEPLOYER_PRIVATE_KEY etc. if needed
#   docker compose up --build
#
# Individual service rebuild:
#   docker compose build auth
#   docker compose up -d auth
#
# Reset everything (wipes volumes):
#   docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gold
      POSTGRES_PASSWORD: gold
      POSTGRES_DB: gold
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gold -d gold"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # HTTP monitoring
    volumes:
      - ./docker/nats/nats.conf:/etc/nats/nats.conf:ro
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # One-shot init container: creates the GOLD JetStream stream.
  nats-init:
    image: natsio/nats-box:latest
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - ./docker/nats/stream-init.sh:/stream-init.sh:ro
    entrypoint: ["sh", "/stream-init.sh"]
    restart: on-failure

  softhsm:
    build:
      context: ./docker/softhsm
    restart: unless-stopped
    environment:
      SOFTHSM2_CONF: /etc/softhsm2/softhsm2.conf
    volumes:
      - softhsm-tokens:/var/lib/softhsm/tokens

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    restart: unless-stopped
    entrypoint: ["anvil"]
    command:
      - "--host=0.0.0.0"
      - "--chain-id=31337"
      - "--block-time=2"
      - "--accounts=10"
      - "--balance=10000"
      - "--state-interval=300"        # checkpoint state every 5 min
      - "--dump-state=/data/anvil-state.json"
    ports:
      - "8545:8545"
    volumes:
      - anvil-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cast chain-id --rpc-url http://localhost:8545 > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Backend services ─────────────────────────────────────────────────────────

  auth:
    build:
      context: ./backend
      dockerfile: services/auth/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_AUTH_HTTP_ADDR: ":8082"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  mint-burn:
    build:
      context: ./backend
      dockerfile: services/mint-burn/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
      anvil:
        condition: service_healthy
    environment:
      GOLD_ENV: local
      GOLD_HTTP_ADDR: ":8081"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      CHAIN_RPC_URL: http://anvil:8545
      CHAIN_ID: "31337"
      # MINT_CONTROLLER_ADDR is optional in local env (service runs in stub mode)
      MINT_CONTROLLER_ADDR: ""
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  price-oracle:
    build:
      context: ./backend
      dockerfile: services/price-oracle/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_PRICE_HTTP_ADDR: ":8083"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      # GOLD_PRICE_API_KEY: ""  # set to goldapi.io key for real prices; stub used when empty
      GOLD_PRICE_REFRESH_INTERVAL: "60s"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  wallet:
    build:
      context: ./backend
      dockerfile: services/wallet/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
      anvil:
        condition: service_healthy
    environment:
      GOLD_ENV: local
      GOLD_WALLET_HTTP_ADDR: ":8084"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      CHAIN_RPC_URL: http://anvil:8545
      # GOLD_TOKEN_ADDR: ""  # set to deployed ERC-20 address; returns 0 when empty
      # JWT_PUBLIC_KEY_FILE: ""  # set to auth service public key path for production
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8084/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  order:
    build:
      context: ./backend
      dockerfile: services/order/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_ORDER_HTTP_ADDR: ":8085"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      # JWT_PUBLIC_KEY_FILE: ""  # set to auth service public key path for production
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8085/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  compliance:
    build:
      context: ./backend
      dockerfile: services/compliance/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_COMPLIANCE_HTTP_ADDR: ":8086"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      # SANCTIONS_LIST_FILE: ""  # override embedded list with a custom file path
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  kyc:
    build:
      context: ./backend
      dockerfile: services/kyc/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_KYC_HTTP_ADDR: ":8087"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      KYC_ADMIN_SECRET: dev-admin-secret
      KYC_UPLOAD_DIR: /data/kyc-uploads
    ports:
      - "8087:8087"
    volumes:
      - kyc-uploads:/data/kyc-uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8087/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  por:
    build:
      context: ./backend
      dockerfile: services/por/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
      anvil:
        condition: service_healthy
    environment:
      GOLD_ENV: local
      GOLD_POR_HTTP_ADDR: ":8088"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      CHAIN_RPC_URL: http://anvil:8545
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  treasury:
    build:
      context: ./backend
      dockerfile: services/treasury/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_TREASURY_HTTP_ADDR: ":8089"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      TREASURY_ADMIN_SECRET: local-treasury-secret
    ports:
      - "8089:8089"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8089/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  audit:
    build:
      context: ./backend
      dockerfile: services/audit/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_AUDIT_HTTP_ADDR: ":8090"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      AUDIT_ADMIN_SECRET: local-audit-secret
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8090/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  vault:
    build:
      context: ./backend
      dockerfile: services/vault/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_VAULT_HTTP_ADDR: ":8091"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      VAULT_ADMIN_SECRET: local-vault-secret
    ports:
      - "8091:8091"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8091/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  fee:
    build:
      context: ./backend
      dockerfile: services/fee/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_FEE_HTTP_ADDR: ":8092"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      FEE_ADMIN_SECRET: local-fee-secret
    ports:
      - "8092:8092"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8092/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  notification:
    build:
      context: ./backend
      dockerfile: services/notification/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_NOTIFICATION_HTTP_ADDR: ":8093"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      # SMTP_HOST: ""  # set for real email delivery
      # SENDGRID_API_KEY: ""  # alternative email provider
    ports:
      - "8093:8093"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8093/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  admin:
    build:
      context: ./backend
      dockerfile: services/admin/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_healthy
      kyc:
        condition: service_healthy
    environment:
      GOLD_ENV: local
      GOLD_ADMIN_HTTP_ADDR: ":8094"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      GOLD_ADMIN_SECRET: local-admin-secret
      KYC_SERVICE_URL: http://kyc:8087
      AUTH_SERVICE_URL: http://auth:8082
      ORDER_SERVICE_URL: http://order:8085
      TREASURY_SERVICE_URL: http://treasury:8089
      VAULT_SERVICE_URL: http://vault:8091
      FEE_SERVICE_URL: http://fee:8092
      AUDIT_SERVICE_URL: http://audit:8090
      COMPLIANCE_SERVICE_URL: http://compliance:8086
      KYC_ADMIN_SECRET: dev-admin-secret
      AUTH_ADMIN_SECRET: local-auth-secret
    ports:
      - "8094:8094"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8094/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  reporting:
    build:
      context: ./backend
      dockerfile: services/reporting/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_REPORTING_HTTP_ADDR: ":8095"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      REPORTING_ADMIN_SECRET: local-reporting-secret
    ports:
      - "8095:8095"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8095/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend-web
    restart: unless-stopped
    # Bind-mount source for hot reload; keep node_modules inside the container
    # (anonymous volume shadows the host node_modules to avoid platform conflicts)
    volumes:
      - ./frontend-web:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_AUTH_URL: http://localhost:8082
      NEXT_PUBLIC_MINTBURN_URL: http://localhost:8081
      NEXT_PUBLIC_PRICE_ORACLE_URL: http://localhost:8083
      NEXT_PUBLIC_WALLET_URL: http://localhost:8084
      NEXT_PUBLIC_ORDER_URL: http://localhost:8085
      NEXT_PUBLIC_COMPLIANCE_URL: http://localhost:8086
      NEXT_PUBLIC_KYC_URL: http://localhost:8087
      NEXT_PUBLIC_POR_URL: http://localhost:8088
      NEXT_PUBLIC_TREASURY_URL: http://localhost:8089
      NEXT_PUBLIC_ADMIN_URL: http://localhost:8094
      NEXT_PUBLIC_CHAIN_RPC_URL: http://localhost:8545
      NEXT_PUBLIC_CHAIN_ID: "31337"
    ports:
      - "3000:3000"

  # ── Block Explorer ────────────────────────────────────────────────────────────

  blockscout:
    image: blockscout/blockscout:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      anvil:
        condition: service_healthy
    environment:
      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_HTTP_URL: http://anvil:8545
      DATABASE_URL: postgres://gold:gold@postgres:5432/blockscout
      ECTO_USE_SSL: "false"
      SECRET_KEY_BASE: "56NtB3PuGWRhi9j7V59Hcd5dJxJ4R2bIHGH7pBbAHNVSq2gA/wJJBrfIBAfntFEw"
      CHAIN_ID: "31337"
      COIN: GOLD
      COIN_NAME: "GOLD Token"
      LOGO: "/images/blockscout_logo.svg"
      SUBNETWORK: "GOLD Local Dev"
      NETWORK: "GOLD"
      DISABLE_EXCHANGE_RATES: "true"
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
      INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "true"
      FETCH_REWARDS: "false"
      POOL_SIZE: "10"
      POOL_SIZE_API: "10"
    ports:
      - "4000:4000"
    command: >
      sh -c "
        bin/blockscout eval 'Elixir.Explorer.ReleaseTasks.create_and_migrate()' &&
        bin/blockscout start
      "

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  nats-data:
  softhsm-tokens:
  anvil-data:
  kyc-uploads:
