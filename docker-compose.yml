name: gold-token

# ─────────────────────────────────────────────────────────────────────────────
# Local development stack
#
# Quick start:
#   cp .env.example .env        # fill in DEPLOYER_PRIVATE_KEY etc. if needed
#   docker compose up --build
#
# Individual service rebuild:
#   docker compose build auth
#   docker compose up -d auth
#
# Reset everything (wipes volumes):
#   docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gold
      POSTGRES_PASSWORD: gold
      POSTGRES_DB: gold
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gold -d gold"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # HTTP monitoring
    volumes:
      - ./docker/nats/nats.conf:/etc/nats/nats.conf:ro
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # One-shot init container: creates the GOLD JetStream stream.
  nats-init:
    image: natsio/nats-box:latest
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - ./docker/nats/stream-init.sh:/stream-init.sh:ro
    entrypoint: ["sh", "/stream-init.sh"]
    restart: on-failure

  softhsm:
    build:
      context: ./docker/softhsm
    restart: unless-stopped
    environment:
      SOFTHSM2_CONF: /etc/softhsm2/softhsm2.conf
    volumes:
      - softhsm-tokens:/var/lib/softhsm/tokens

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    restart: unless-stopped
    entrypoint: ["anvil"]
    command:
      - "--host=0.0.0.0"
      - "--chain-id=31337"
      - "--block-time=2"
      - "--accounts=10"
      - "--balance=10000"
      - "--state-interval=300"        # checkpoint state every 5 min
      - "--dump-state=/data/anvil-state.json"
    ports:
      - "8545:8545"
    volumes:
      - anvil-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cast chain-id --rpc-url http://localhost:8545 > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Backend services ─────────────────────────────────────────────────────────

  auth:
    build:
      context: ./backend
      dockerfile: services/auth/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_AUTH_HTTP_ADDR: ":8082"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  mint-burn:
    build:
      context: ./backend
      dockerfile: services/mint-burn/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
      anvil:
        condition: service_healthy
    environment:
      GOLD_ENV: local
      GOLD_HTTP_ADDR: ":8081"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      CHAIN_RPC_URL: http://anvil:8545
      CHAIN_ID: "31337"
      # MINT_CONTROLLER_ADDR is optional in local env (service runs in stub mode)
      MINT_CONTROLLER_ADDR: ""
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  price-oracle:
    build:
      context: ./backend
      dockerfile: services/price-oracle/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_PRICE_HTTP_ADDR: ":8083"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      # GOLD_PRICE_API_KEY: ""  # set to goldapi.io key for real prices; stub used when empty
      GOLD_PRICE_REFRESH_INTERVAL: "60s"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  wallet:
    build:
      context: ./backend
      dockerfile: services/wallet/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
      anvil:
        condition: service_healthy
    environment:
      GOLD_ENV: local
      GOLD_WALLET_HTTP_ADDR: ":8084"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      CHAIN_RPC_URL: http://anvil:8545
      # GOLD_TOKEN_ADDR: ""  # set to deployed ERC-20 address; returns 0 when empty
      # JWT_PUBLIC_KEY_FILE: ""  # set to auth service public key path for production
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8084/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  order:
    build:
      context: ./backend
      dockerfile: services/order/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_ORDER_HTTP_ADDR: ":8085"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      # JWT_PUBLIC_KEY_FILE: ""  # set to auth service public key path for production
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8085/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  compliance:
    build:
      context: ./backend
      dockerfile: services/compliance/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_COMPLIANCE_HTTP_ADDR: ":8086"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      # SANCTIONS_LIST_FILE: ""  # override embedded list with a custom file path
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  kyc:
    build:
      context: ./backend
      dockerfile: services/kyc/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    environment:
      GOLD_ENV: local
      GOLD_KYC_HTTP_ADDR: ":8087"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      KYC_ADMIN_SECRET: dev-admin-secret
      KYC_UPLOAD_DIR: /data/kyc-uploads
    ports:
      - "8087:8087"
    volumes:
      - kyc-uploads:/data/kyc-uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8087/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  por:
    build:
      context: ./backend
      dockerfile: services/por/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
      anvil:
        condition: service_healthy
    environment:
      GOLD_ENV: local
      GOLD_POR_HTTP_ADDR: ":8088"
      DATABASE_URL: postgres://gold:gold@postgres:5432/gold
      NATS_URL: nats://nats:4222
      GOLD_NATS_STREAM: GOLD
      CHAIN_RPC_URL: http://anvil:8545
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend-web
    restart: unless-stopped
    # Bind-mount source for hot reload; keep node_modules inside the container
    # (anonymous volume shadows the host node_modules to avoid platform conflicts)
    volumes:
      - ./frontend-web:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_AUTH_URL: http://localhost:8082
      NEXT_PUBLIC_MINTBURN_URL: http://localhost:8081
      NEXT_PUBLIC_PRICE_ORACLE_URL: http://localhost:8083
      NEXT_PUBLIC_WALLET_URL: http://localhost:8084
      NEXT_PUBLIC_ORDER_URL: http://localhost:8085
      NEXT_PUBLIC_COMPLIANCE_URL: http://localhost:8086
      NEXT_PUBLIC_KYC_URL: http://localhost:8087
      NEXT_PUBLIC_POR_URL: http://localhost:8088
      NEXT_PUBLIC_CHAIN_RPC_URL: http://localhost:8545
      NEXT_PUBLIC_CHAIN_ID: "31337"
    ports:
      - "3000:3000"

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  nats-data:
  softhsm-tokens:
  anvil-data:
  kyc-uploads:
