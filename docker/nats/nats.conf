# NATS server configuration for LOCAL DEVELOPMENT ONLY.
# JetStream enabled with file-backed storage.
#
# SECURITY (staging/prod): this local config has NO authentication or TLS, which is
# acceptable only on an isolated local network where NATS is not published off-host.
# Before any shared/production deployment you MUST enable per-service credentials and
# subject-scoped permissions, plus TLS, e.g.:
#
#   tls { cert_file: "/certs/server.pem"  key_file: "/certs/server-key.pem" }
#   authorization {
#     users = [
#       { user: "mintburn", password: $NATS_MINTBURN_PW,
#         permissions: { publish: ["gold.mint.>","gold.burn.>"], subscribe: ["gold.order.>"] } }
#       # ... one least-privilege user per service ...
#     ]
#   }
#
# and update each service's NATS_URL to include its credentials. Tracked as a
# deployment hardening task; do not ship this file to a network-exposed NATS.

port: 4222
http_port: 8222

# Enable JetStream
jetstream {
  store_dir: /data
  max_memory_store: 256MB
  max_file_store: 1GB
}

# Logging
debug: false
trace: false
